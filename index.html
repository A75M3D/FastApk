<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA → APK | مدعوم بالذكاء الاصطناعي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    body { background: radial-gradient(circle at 20% 30%, #1a0b2e 0%, #0e0418 100%); font-family: 'Segoe UI', 'Tajawal', sans-serif; }
    .glass-card { background: rgba(20, 5, 35, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(180, 130, 255, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
    .gradient-text { background: linear-gradient(135deg, #e9b6ff 0%, #b76eff 50%, #a855f7 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-gradient { background: linear-gradient(145deg, #6b21a8, #4c1d95); }
  </style>
</head>
<body class="text-white min-h-screen p-4 md:p-6">
  <script>
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAD-8TuY7PZ_wCpnCkgEY6zWJM7sr6PjOE",
  authDomain: "pwa2apk-96645.firebaseapp.com",
  projectId: "pwa2apk-96645",
  storageBucket: "pwa2apk-96645.firebasestorage.app",
  messagingSenderId: "32361192102",
  appId: "1:32361192102:web:3ec47a71824f56455df267",
  measurementId: "G-LPV8HRYN39"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

<div class="w-full max-w-4xl mx-auto">
  
  <!-- الشعار -->
  <div class="text-center mb-6">
    <div class="flex items-center justify-center gap-2">
      <i class="fas fa-cube text-4xl text-purple-400"></i>
      <h1 class="text-4xl md:text-6xl font-bold"><span>PWA</span> <span class="gradient-text text-5xl">→</span> <span class="gradient-text">APK</span></h1>
      <i class="fas fa-robot text-4xl text-purple-400"></i>
    </div>
    <p class="text-purple-300"><i class="fas fa-brain"></i> مدعوم بالذكاء الاصطناعي <i class="fas fa-brain"></i></p>
  </div>

  <!-- البطاقة الرئيسية -->
  <div class="glass-card rounded-3xl p-6 md:p-8 mb-6">
    <h2 class="text-2xl font-bold mb-4"><i class="fas fa-magic text-purple-400 ml-2"></i>حول أي موقع إلى تطبيق اندرويد</h2>
    <p class="text-gray-300 text-sm mb-6">ضع رابط الموقع، وأدخل بياناتك، واستلم الملفات كاملة مع مفاتيح التوقيع والتعليمات.</p>

    <!-- نموذج الإدخال -->
    <div class="space-y-4">
      <input type="text" id="userName" placeholder="الاسم الكامل" class="w-full bg-black/40 border border-purple-500/40 rounded-xl py-4 px-4 text-white">
      <input type="email" id="userEmail" placeholder="البريد الإلكتروني" class="w-full bg-black/40 border border-purple-500/40 rounded-xl py-4 px-4 text-white" dir="ltr">
      <input type="url" id="siteUrl" placeholder="https://example.com" class="w-full bg-black/40 border border-purple-500/40 rounded-xl py-4 px-4 text-white" dir="ltr">
      
      <!-- اختيار طريقة التواصل -->
      <div class="flex gap-4 items-center">
        <label class="flex items-center gap-2"><input type="radio" name="contactMethod" value="whatsapp" checked> <i class="fab fa-whatsapp text-green-400"></i> واتساب</label>
        <label class="flex items-center gap-2"><input type="radio" name="contactMethod" value="email"> <i class="fas fa-envelope text-blue-300"></i> بريد</label>
      </div>
      
      <input type="text" id="contactValue" placeholder="رقم الواتساب مع مفتاح الدولة" class="w-full bg-black/40 border border-purple-500/40 rounded-xl py-4 px-4 text-white" dir="ltr">
      
      <div class="bg-purple-900/30 p-3 rounded-lg text-sm">
        <i class="fas fa-clock ml-1"></i> بعد المعالجة تستلم APK + AAB + مفاتيح التوقيع + تعليمات النشر
      </div>

      <button id="submitBtn" class="btn-gradient w-full py-4 rounded-xl font-bold text-lg"><i class="fas fa-flask ml-2"></i>حلل وحوّل</button>
    </div>

    <!-- المميزات -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-6 text-center text-sm">
      <div class="bg-white/5 p-3 rounded-lg"><i class="fas fa-bolt text-purple-400"></i> بناء فوري</div>
      <div class="bg-white/5 p-3 rounded-lg"><i class="fas fa-shield-alt text-purple-400"></i> إصلاح تلقائي</div>
      <div class="bg-white/5 p-3 rounded-lg"><i class="fab fa-google-play text-purple-400"></i> جاهز لـ Play</div>
    </div>
  </div>

  <!-- حالة الطلب -->
  <div id="requestStatus" class="glass-card rounded-2xl p-5 hidden">
    <h3 class="text-lg font-bold mb-3">طلبك قيد المعالجة ⏳</h3>
    <p id="statusMessage" class="text-gray-300"></p>
  </div>

</div>

<script>
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('requestStatus');
  const statusMsg = document.getElementById('statusMessage');

  // تحديث placeholder حسب طريقة التواصل
  document.querySelectorAll('input[name="contactMethod"]').forEach(r => {
    r.addEventListener('change', (e) => {
      const input = document.getElementById('contactValue');
      input.placeholder = e.target.value === 'whatsapp' ? 'رقم الواتساب مع مفتاح الدولة' : 'example@domain.com';
    });
  });

  submitBtn.addEventListener('click', async () => {
    const name = document.getElementById('userName').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const site = document.getElementById('siteUrl').value.trim();
    const method = document.querySelector('input[name="contactMethod"]:checked').value;
    const contact = document.getElementById('contactValue').value.trim();

    if (!name || !email || !site || !contact) return alert('جميع الحقول مطلوبة');
    if (!site.startsWith('http')) return alert('رابط غير صحيح');
    if (method === 'email' && !email.includes('@')) return alert('بريد غير صحيح');

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحليل...';

    try {
      await db.collection('conversionRequests').add({
        userName: name,
        userEmail: email,
        siteUrl: site,
        contactMethod: method,
        contactValue: contact,
        status: 'processing',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      statusDiv.classList.remove('hidden');
      statusMsg.textContent = `تم استلام طلبك "${site}". ستصل الملفات الكاملة إلى ${method === 'whatsapp' ? 'واتساب' : 'بريدك'} (${contact}) خلال دقائق.`;

      document.getElementById('siteUrl').value = '';
      document.getElementById('contactValue').value = '';
    } catch (e) {
      alert('خطأ: ' + e.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-flask ml-2"></i>حلل وحوّل';
    }
  });
</script>

<!-- لوحة أدمن بسيطة -->
<div style="position:fixed;bottom:10px;left:10px;opacity:0.5">
  <button onclick="window.location.href='#'" class="text-[10px] text-purple-400">⚡</button>
</div>
</body>
</html>
